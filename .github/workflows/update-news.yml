name: Update Yahoo Finance News

on:
  schedule:
    # 01:07 UTC = 08:07 Bangkok daily
    - cron: '7 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/news.js
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto: update Yahoo Finance news $(TZ=Asia/Bangkok date +%Y-%m-%d)"
            git push
          fi
