<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <title>แดชบอร์ด · My Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app" id="app">
    <div class="page-header">
      <h1>แดชบอร์ด</h1>
      <p>ภาพรวมการเงินของคุณ</p>
    </div>

    <div class="grid grid-4" style="margin-bottom: 20px;" id="stats"></div>

    <div class="card" style="margin-bottom: 20px;">
      <div class="section-title">📅 Daily Snapshot</div>
      <div id="dailySnapshot"></div>
    </div>

    <div class="grid grid-2" style="margin-bottom: 20px;">
      <div class="card">
        <div class="section-title">📊 รายจ่ายตามหมวด (เดือนนี้)</div>
        <div class="chart-wrap"><canvas id="catChart"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title">📈 เทรนด์รายเดือน (6 เดือนล่าสุด)</div>
        <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <div class="section-title">💹 สัดส่วนการลงทุน</div>
        <div class="chart-wrap"><canvas id="investChart"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title">🕐 รายการล่าสุด</div>
        <div id="recentList"></div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="assets/stocks.js"></script>
  <script src="assets/snapshots.js"></script>
  <script src="js/firebase-config.js"></script>
  <script type="module" src="js/firebase-sync.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});</script>
  <script src="js/dashboard.js"></script>
  <script>window.addEventListener('firebase-pulled', renderAll);</script>
</body>
</html>
